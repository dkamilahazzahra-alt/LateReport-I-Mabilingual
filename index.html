<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Absensi | Sekolah Digital</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css"> 
</head>
<body>

<nav class="navbar navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="#"><i class="fas fa-school me-2"></i>SMART ABSENSI KETERLAMBATAN MAB</a>
        <div id="liveClock">00:00:00</div>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-4 mb-4">
            <div class="card h-100">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span><i class="fas fa-user-edit me-2"></i>Isi Kehadiran</span>
                </div>
                <div class="card-body">
                    <form id="absenForm">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nama Lengkap</label>
                            <input type="text" id="nama" class="form-control" placeholder="Contoh: Dewi Kamilah" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Kelas</label>
                            <select id="kelas" class="form-select" required>
                                <option value="" selected disabled>Pilih Kelas...</option>
                                <option>X - 1</option>
                                <option>X - 2</option>
                                <option>XI - 1</option>
                                <option>XI - 2</option>
                                <option>XII - 1</option>
                                <option>XII - 2</option>
                            </select>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Status</label>
                            <select id="status" class="form-select">
                                <option value="Hadir">✅ Terlambat</option>
                                <option value="Izin">📝 Izin</option>
                                <option value="Sakit">💊 Sakit</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">
                            <i class="fas fa-paper-plane me-2"></i>KIRIM DATA
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="card h-100">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span><i class="fas fa-table me-2"></i>Rekapitulasi Hari Ini</span>
                    <button onclick="exportExcel()" class="btn btn-success btn-sm">
                        <i class="fas fa-file-excel me-1"></i> Export Excel
                    </button>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover table-striped align-middle">
                            <thead>
                                <tr>
                                    <th>Waktu</th>
                                    <th>Nama Siswa</th>
                                    <th>Kelas</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="tabelData">
                                </tbody>
                        </table>
                        <div id="emptyState" class="text-center py-5" style="display:none;">
                            <img src="https://cdn-icons-png.flaticon.com/512/7486/7486754.png" width="100" class="mb-3 opacity-50">
                            <p class="text-muted">Belum ada data absensi hari ini.</p>
                        </div>
                    </div>
                    <button onclick="clearData()" class="btn btn-outline-danger btn-sm mt-3 float-end">
                        <i class="fas fa-trash me-1"></i> Reset Data
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="text-center py-4 mt-5 text-muted">
    <small>&copy; 2024 Project Informatika Kelas 11</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="script.js"></script> 

</body>
</html>
